      - ./service:/app
    environment:
      - MODEL_NAME=minicpm-v
      - DB_HOST=127.0.0.1
      - DB_PORT=4546
      - DB_NAME=newron_news
      - DB_USER=newron
      - DB_PASSWORD=teamnova0416
    command: uvicorn server:app --host 0.0.0.0 --port 7002
    depends_on:
      - ollama_engine

  # [모델 3] LLaVA-Phi3 (Port: 7003)
  api_phi3:
