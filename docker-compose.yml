      - DB_PASSWORD=teamnova0416
    command: uvicorn server:app --host 0.0.0.0 --port 7005
    depends_on:
      - ollama_engine

  # [기존] Moondream (Port: 7000)
  vision_api:
    build: ./service
    container_name: vision_api
    network_mode: host
    volumes:
      - ./service:/app
    environment:
      - MODEL_NAME=moondream
      - DB_HOST=127.0.0.1
      - DB_PORT=4546
      - DB_NAME=newron_news
      - DB_USER=newron
      - DB_PASSWORD=teamnova0416
    command: uvicorn server:app --host 0.0.0.0 --port 7000
    depends_on:
      - ollama_engine

  # [AI 엔진] Ollama Engine
  ollama_engine:
    image: ollama/ollama:latest
    container_name: vision_ollama
    network_mode: host
    volumes:
      - ./ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]