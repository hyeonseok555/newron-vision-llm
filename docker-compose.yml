services:
  # [모델 1] Llama 3.2 Vision (Port: 7001)
  api_llama:
    build: ./service
    container_name: api_llama
    network_mode: host
    volumes:
      - ./service:/app
    environment:
      - MODEL_NAME=llama3.2-vision
      - DB_HOST=127.0.0.1
      - DB_PORT=4546
      - DB_NAME=newron_news
      - DB_USER=newron
      - DB_PASSWORD=teamnova0416
    command: uvicorn server:app --host 0.0.0.0 --port 7001
    depends_on:
      - ollama_engine

  # [모델 2] MiniCPM-V (Port: 7002)
  api_minicpm:
    build: ./service
    container_name: api_minicpm
    network_mode: host
