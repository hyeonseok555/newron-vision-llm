  # [모델 5] LLaVA v1.6 (Port: 7005)
  api_llava_v16:
    build: ./service
    container_name: api_llava_v16
    network_mode: host
    volumes:
      - ./service:/app
    environment:
      - MODEL_NAME=llava:v1.6
      - DB_HOST=127.0.0.1
      - DB_PORT=4546
